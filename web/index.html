<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemForge — LeetCode for System Design</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo">
            <i class="fas fa-cogs"></i>
            <span>SystemForge</span>
        </div>
        <nav class="problem-nav">
            <select id="problem-select">
                <option value="">Select a problem...</option>
            </select>
        </nav>
        <div class="actions">
            <button id="btn-run" class="btn btn-primary" title="Run All Tests (Ctrl+Enter)">
                <i class="fas fa-play"></i> Run
            </button>
            <button id="btn-step" class="btn btn-secondary" title="Step Event">
                <i class="fas fa-step-forward"></i> Step
            </button>
            <button id="btn-reset" class="btn btn-secondary" title="Reset">
                <i class="fas fa-redo"></i> Reset
            </button>
        </div>
    </header>

    <main class="workspace">
        <!-- Left: Graph Editor -->
        <div class="panel panel-graph" id="graph-panel">
            <div class="panel-header">
                <span>Architecture</span>
                <div class="component-palette">
                    <button class="palette-btn" data-type="Client" title="Client">
                        <i class="fas fa-user"></i>
                    </button>
                    <button class="palette-btn" data-type="HttpServer" title="HTTP Server">
                        <i class="fas fa-server"></i>
                    </button>
                    <button class="palette-btn" data-type="Database" title="Database">
                        <i class="fas fa-database"></i>
                    </button>
                    <button class="palette-btn" data-type="Cache" title="Cache">
                        <i class="fas fa-bolt"></i>
                    </button>
                </div>
            </div>
            <canvas id="graph-canvas"></canvas>
        </div>

        <!-- Center: Code Editor -->
        <div class="panel panel-code" id="code-panel">
            <div class="panel-header">
                <span id="code-title">Code</span>
                <div class="code-tabs" id="code-tabs"></div>
            </div>
            <div id="editor-container"></div>
        </div>

        <!-- Right: Info Panel -->
        <div class="panel panel-info" id="info-panel">
            <!-- Problem Description -->
            <div class="sub-panel" id="description-panel">
                <div class="panel-header"><span>Problem</span></div>
                <div class="panel-content" id="problem-description">
                    <div class="placeholder-text">
                        <i class="fas fa-book"></i>
                        <p>Select a problem to get started</p>
                    </div>
                </div>
            </div>

            <!-- Test Results -->
            <div class="sub-panel" id="results-panel">
                <div class="panel-header"><span>Tests</span></div>
                <div class="panel-content" id="test-results">
                    <div class="placeholder-text">
                        <i class="fas fa-vial"></i>
                        <p>Run tests to see results</p>
                    </div>
                </div>
            </div>

            <!-- Console -->
            <div class="sub-panel" id="console-panel">
                <div class="panel-header">
                    <span>Console</span>
                    <button class="btn-small" id="btn-clear-console" title="Clear">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="panel-content console-output" id="console-output"></div>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
